name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: powerclan_test
          MYSQL_USER: powerclan
          MYSQL_PASSWORD: powerclan_secure_2024
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, mbstring, intl
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -uroot -proot --silent; do
            sleep 1
          done

      - name: Setup test database
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "GRANT ALL PRIVILEGES ON *.* TO 'powerclan'@'%';"
          mysql -h 127.0.0.1 -upowerclan -ppowerclan_secure_2024 powerclan_test < powerclan.sql

      - name: PHP Syntax Check
        run: |
          set -o pipefail
          # `php -l` gibt pro Datei entweder "No syntax errors …" oder den Fehler aus.
          # Wir filtern die OK-Zeilen raus und lassen nur Fehler übrig. `grep -v` kehrt
          # exit 1 bei leerem Output zurück — wir brauchen `|| true` für den OK-Fall.
          ERRORS=$(find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./.phpunit.cache/*" \
            -not -path "./coverage/*" \
            -not -path "./coverage-report/*" \
            -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true)
          if [ -n "$ERRORS" ]; then
            echo "Syntax errors found:"
            echo "$ERRORS"
            exit 1
          fi
          echo "Syntax check completed (keine Fehler)"

      - name: PHPStan Static Analysis (Level 8)
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Psalm Static Analysis (Level 4)
        run: vendor/bin/psalm --no-progress

      - name: PHPUnit Tests with Coverage
        run: vendor/bin/phpunit --coverage-text --coverage-xml=coverage/coverage-xml --log-junit=coverage/junit.xml
        env:
          DB_HOST: 127.0.0.1
          DB_USER: powerclan
          DB_PASSWORD: powerclan_secure_2024
          DB_DATABASE: powerclan_test
          DB_PORT: 3306

      - name: Infection Mutation Testing
        run: vendor/bin/infection --threads=4 --skip-initial-tests --coverage=coverage --no-progress --logger-github
        continue-on-error: true

      - name: Security Check
        run: composer audit
        continue-on-error: true

  code-style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP-CS-Fixer Check
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
